<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Lago Azul 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Versión r128: la más compatible para abrir archivos locales sin servidor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls versión compatible con r128 -->
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0a0a0a; font-family: sans-serif; }
        canvas { display: block; }
        .label {
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <!-- Interfaz de Usuario -->
    <div class="absolute left-6 top-6 z-10 max-w-sm rounded-2xl border border-white/10 bg-black/60 p-6 shadow-2xl backdrop-blur-md text-white">
        <h1 class="text-2xl font-light tracking-tight">Lote L <span class="text-blue-300">Lago Azul</span></h1>
        <p class="mt-2 text-xs text-white/60 leading-relaxed">Modelo conceptual 3D. Usa el ratón para girar y hacer zoom.</p>
        
        <div class="mt-6 grid grid-cols-2 gap-2">
            <button onclick="moveCamera(0, 18, -24, 0, 3, 8)" class="text-left px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/5 text-[11px] transition-all">Vista Global</button>
            <button onclick="moveCamera(0, 10, -10, 0, 3, 8)" class="text-left px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/5 text-[11px] transition-all">Casa Principal</button>
            <button onclick="moveCamera(15, 10, 5, 10.5, 3, 6)" class="text-left px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/5 text-[11px] transition-all">Quincho</button>
            <button onclick="moveCamera(-12, 10, 5, -7, 3, 8)" class="text-left px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/5 text-[11px] transition-all">Bodega</button>
        </div>
    </div>

    <div id="labels-container"></div>

    <script>
        // --- CONFIGURACIÓN BÁSICA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdbe7f4);
        scene.fog = new THREE.Fog(0xdbe7f4, 30, 100);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 18, -24);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // OrbitControls ahora está en THREE.OrbitControls gracias a la versión r128
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 3, 8);

        // --- LUCES ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- MATERIALES ---
        const matBlack = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8 });
        const matDarker = new THREE.MeshStandardMaterial({ color: 0x121212, roughness: 0.8 });
        const matWood = new THREE.MeshStandardMaterial({ color: 0x8b6a45, roughness: 0.8 });
        const matGrass = new THREE.MeshStandardMaterial({ color: 0x7fa06a, roughness: 1 });
        const matWater = new THREE.MeshStandardMaterial({ color: 0x1e4d6b, roughness: 0.1, metalness: 0.3 });
        const matGlass = new THREE.MeshStandardMaterial({ color: 0xa0c4ff, transparent: true, opacity: 0.6 });
        const matSolar = new THREE.MeshStandardMaterial({ color: 0x0c1624, metalness: 0.8, roughness: 0.2 });

        // --- TERRENO Y AGUA ---
        const terrain = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), matGrass);
        terrain.rotation.x = -Math.PI / 2;
        terrain.receiveShadow = true;
        scene.add(terrain);

        const water = new THREE.Mesh(new THREE.PlaneGeometry(60, 25), matWater);
        water.rotation.x = -Math.PI / 2;
        water.position.set(0, -0.02, 22);
        scene.add(water);

        // --- FUNCIONES DE CONSTRUCCIÓN ---
        function createBox(w, h, d, color, pos, mat = null) {
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = mat || new THREE.MeshStandardMaterial({color: color});
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(...pos);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            return mesh;
        }

        function createSolarRoof(width, depth, y, parent) {
            const cols = Math.floor(width / 0.9);
            const rows = Math.floor(depth / 1.4);
            for (let x = 0; x < cols; x++) {
                for (let z = 0; z < rows; z++) {
                    const panel = createBox(0.72, 0.03, 1.15, 0x0c1624, 
                        [-width / 2 + 0.55 + x * 0.9, y, -depth / 2 + 0.8 + z * 1.4], matSolar);
                    panel.rotation.x = -0.02;
                    parent.add(panel);
                }
            }
        }

        function addLabel(text, pos) {
            const div = document.createElement('div');
            div.className = 'label';
            div.textContent = text;
            document.getElementById('labels-container').appendChild(div);
            return { element: div, pos: new THREE.Vector3(...pos) };
        }

        const labels = [];

        // --- EDIFICIOS ---
        
        // Casa Principal
        const mainHouse = new THREE.Group();
        mainHouse.position.set(0, 0, 2);
        mainHouse.add(createBox(10.5, 0.12, 8.8, 0x8b6a45, [0, 0.18, 0], matWood));
        mainHouse.add(createBox(8.8, 2.8, 6.6, 0x1a1a1a, [0, 1.45, 0], matBlack));
        mainHouse.add(createBox(3, 1.2, 0.1, 0xa0c4ff, [0, 1.5, 3.31], matGlass)); 
        mainHouse.add(createBox(6.8, 2.6, 5.1, 0x121212, [0, 4.45, -0.2], matDarker));
        mainHouse.add(createBox(3, 1, 0.1, 0xa0c4ff, [0, 4.5, 2.31], matGlass));
        mainHouse.add(createBox(7.4, 0.18, 5.7, 0x262626, [0, 5.82, -0.2]));
        createSolarRoof(7.1, 5.4, 5.95, mainHouse);
        scene.add(mainHouse);
        labels.push(addLabel("Casa Principal · 168m²", [0, 6.8, 2]));

        // Quincho
        const quincho = new THREE.Group();
        quincho.position.set(10.5, 0, 6);
        quincho.add(createBox(5.6, 0.12, 5.6, 0x8b6a45, [0, 0.18, 0], matWood));
        quincho.add(createBox(4.8, 2.5, 4.8, 0x1a1a1a, [0, 1.35, 0], matBlack));
        quincho.add(createBox(2, 1, 0.1, 0xa0c4ff, [0, 1.35, 2.41], matGlass));
        quincho.add(createBox(5.4, 0.16, 5.4, 0x2c2c2c, [0, 2.7, 0]));
        createSolarRoof(5.1, 5.1, 2.82, quincho);
        scene.add(quincho);
        labels.push(addLabel("Quincho · 36m²", [10.5, 3.7, 6]));

        // Bodega
        const bodega = new THREE.Group();
        bodega.position.set(-7, 0, 8);
        bodega.add(createBox(3.8, 2.3, 5.8, 0x1b1b1b, [0, 1.15, 0], matBlack));
        bodega.add(createBox(4.2, 0.16, 6.1, 0x2a2a2a, [0, 2.38, 0]));
        createSolarRoof(3.8, 5.8, 2.5, bodega);
        scene.add(bodega);
        labels.push(addLabel("Bodega · 24m²", [-7, 3.3, 8]));

        // Parking
        const parking = new THREE.Group();
        parking.position.set(8.5, 0, -1);
        const pFloor = new THREE.Mesh(new THREE.PlaneGeometry(6, 5.3), new THREE.MeshStandardMaterial({color: 0x7d7b75}));
        pFloor.rotation.x = -Math.PI / 2;
        pFloor.position.y = 0.03;
        parking.add(pFloor);
        
        const car1 = new THREE.Group();
        car1.add(createBox(1.7, 0.5, 3.2, 0xd9d9d9, [0, 0.25, 0]));
        car1.add(createBox(1.3, 0.4, 1.7, 0xd9d9d9, [0, 0.6, -0.1]));
        car1.position.set(-1.5, 0, 0);
        parking.add(car1);

        const car2 = new THREE.Group();
        car2.add(createBox(1.7, 0.5, 3.2, 0x333333, [0, 0.25, 0]));
        car2.add(createBox(1.3, 0.4, 1.7, 0x333333, [0, 0.6, -0.1]));
        car2.position.set(1.6, 0, 0.2);
        parking.add(car2);
        scene.add(parking);
        labels.push(addLabel("Estacionamiento", [8.5, 1.6, -1]));

        // Árboles
        function createTree(x, z) {
            const tree = new THREE.Group();
            tree.position.set(x, 0, z);
            const trunk = createBox(0.2, 2.2, 0.2, 0x5d402e, [0, 1.1, 0]);
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.9, 2.1, 8), new THREE.MeshStandardMaterial({color: 0x2d4a2f}));
            leaves.position.set(0, 2.6, 0);
            tree.add(trunk, leaves);
            scene.add(tree);
        }

        for(let i=0; i<15; i++) createTree(-16 - Math.random(), -10 + i * 2.5);
        for(let i=0; i<15; i++) createTree(16 + Math.random(), -10 + i * 2.5);

        // --- ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            labels.forEach(l => {
                const vector = l.pos.clone();
                vector.project(camera);
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (vector.y * -0.5 + 0.5) * window.innerHeight;
                l.element.style.left = x + 'px';
                l.element.style.top = y + 'px';
                l.element.style.display = vector.z > 1 ? 'none' : 'block';
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function moveCamera(px, py, pz, tx, ty, tz) {
            camera.position.set(px, py, pz);
            controls.target.set(tx, ty, tz);
        }

        animate();
    </script>
</body>
</html>

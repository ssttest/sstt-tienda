<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSTT® - Distribuidor Oficial Dahua Chile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .product-card { transition: all 0.3s; }
    .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-50 font-sans">

  <!-- Navbar -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="/" class="flex items-center gap-3 text-2xl font-bold text-red-600">
        <i class="fa-solid fa-video"></i> SSTT®
      </a>
      <div class="flex items-center gap-8 text-lg">
        <a href="#catalogo" class="hover:text-red-600">Catálogo</a>
        <a href="#" class="hover:text-red-600">Academia CCTV</a>
        <a href="#" class="hover:text-red-600">Asesor IA</a>
      </div>
      
      <!-- Carrito -->
      <button onclick="mostrarCarrito()" class="flex items-center gap-2 text-xl hover:text-red-600 relative">
        <i class="fa-solid fa-shopping-cart"></i>
        <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs w-5 h-5 flex items-center justify-center rounded-full">0</span>
      </button>
    </div>
  </nav>

  <!-- HERO -->
  <header class="bg-gradient-to-r from-red-700 to-red-600 text-white py-16">
    <div class="max-w-7xl mx-auto px-6 text-center">
      <h1 class="text-5xl font-bold mb-4">Distribuidor Oficial Dahua en Chile</h1>
      <p class="text-2xl">Tecnología de videovigilancia con la mejor relación calidad-precio</p>
    </div>
  </header>

  <!-- CATÁLOGO (la parte que estaba rota) -->
  <section id="catalogo" class="max-w-7xl mx-auto px-6 py-12">
    <h2 class="text-4xl font-bold text-center mb-10">Catálogo de Productos Dahua</h2>

    <!-- Filtros y búsqueda -->
    <div class="flex flex-col md:flex-row gap-4 mb-8">
      <input 
        id="search-input"
        type="text" 
        placeholder="🔎 Buscar por modelo o nombre..." 
        class="flex-1 px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-red-500 text-lg"
        onkeyup="filtrarProductos()">
      
      <div class="flex flex-wrap gap-2" id="filter-buttons">
        <!-- Los botones de filtro se generan con JS -->
      </div>
    </div>

    <!-- Grid de productos -->
    <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
      <!-- Se llena con JavaScript -->
    </div>
  </section>

  <!-- Modal Carrito -->
  <div id="cart-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[999]">
    <div class="bg-white rounded-3xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-hidden">
      <div class="p-8">
        <h3 class="text-3xl font-bold mb-6 flex justify-between items-center">
          Tu Carrito
          <button onclick="cerrarCarrito()" class="text-gray-400 hover:text-black text-3xl">×</button>
        </h3>
        <div id="cart-items" class="space-y-6 max-h-[60vh] overflow-y-auto"></div>
        
        <div class="border-t pt-6 mt-8">
          <div class="flex justify-between text-2xl font-bold">
            <span>Total:</span>
            <span id="cart-total">$0</span>
          </div>
        </div>
      </div>
      
      <div class="bg-gray-100 p-8 flex gap-4">
        <button onclick="cerrarCarrito()" class="flex-1 py-5 text-lg font-semibold border-2 border-gray-800 rounded-2xl">Seguir comprando</button>
        <button onclick="finalizarCompra()" class="flex-1 py-5 text-lg font-semibold bg-red-600 text-white rounded-2xl">Finalizar compra</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== PRODUCTOS (puedes agregar más aquí) ====================
    let productos = [
      { id:1, nombre:"Cámara Turret WizColor 4K", serie:"WizColor", precio:129990, img:"https://picsum.photos/id/1015/600/400", modelo:"IPC-HDW5442TM-AS-LED" },
      { id:2, nombre:"Cámara Bullet WizColor 4MP", serie:"WizColor", precio:89990, img:"https://picsum.photos/id/160/600/400", modelo:"IPC-HFW5442T-AS-LED" },
      { id:3, nombre:"Cámara TiOC 4K con altavoz", serie:"TiOC", precio:189990, img:"https://picsum.photos/id/201/600/400", modelo:"IPC-HDW3849H-AS-PV" },
      { id:4, nombre:"Cámara WizSense 8MP", serie:"WizSense", precio:149990, img:"https://picsum.photos/id/251/600/400", modelo:"IPC-HDW3841EM-AS" },
      { id:5, nombre:"NVR 8 canales 8MP", serie:"NVR", precio:279990, img:"https://picsum.photos/id/301/600/400", modelo:"NVR4108HS-8P-4KS2" },
      { id:6, nombre:"Cámara AcuPick 4K", serie:"AcuPick", precio:219990, img:"https://picsum.photos/id/180/600/400", modelo:"IPC-HDW5442T-ZE" },
      // Agrega más productos aquí cuando quieras
    ];

    let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

    function renderizarProductos(productosFiltrados) {
      const grid = document.getElementById("product-grid");
      grid.innerHTML = "";
      
      productosFiltrados.forEach(p => {
        const card = document.createElement("div");
        card.className = "product-card bg-white rounded-3xl overflow-hidden shadow-lg";
        card.innerHTML = `
          <img src="${p.img}" alt="${p.nombre}" class="w-full h-56 object-cover">
          <div class="p-6">
            <span class="inline-block px-4 py-1 bg-red-100 text-red-700 text-sm rounded-3xl">${p.serie}</span>
            <h3 class="text-xl font-bold mt-3">${p.nombre}</h3>
            <p class="text-sm text-gray-500">${p.modelo}</p>
            <div class="flex justify-between items-end mt-6">
              <div>
                <span class="text-3xl font-bold">$${p.precio.toLocaleString("es-CL")}</span>
              </div>
              <button onclick="agregarAlCarrito(${p.id})" 
                      class="bg-red-600 hover:bg-red-700 text-white px-6 py-4 rounded-2xl font-semibold flex items-center gap-2">
                <i class="fa-solid fa-cart-plus"></i> Agregar
              </button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      if (productosFiltrados.length === 0) {
        grid.innerHTML = `<p class="text-center text-xl py-12 col-span-full">No encontramos productos con ese filtro 😕</p>`;
      }
    }

    function filtrarProductos() {
      const texto = document.getElementById("search-input").value.toLowerCase().trim();
      const filtrados = productos.filter(p => 
        p.nombre.toLowerCase().includes(texto) || 
        p.modelo.toLowerCase().includes(texto) ||
        p.serie.toLowerCase().includes(texto)
      );
      renderizarProductos(filtrados);
    }

    function generarFiltros() {
      const series = [...new Set(productos.map(p => p.serie))];
      const container = document.getElementById("filter-buttons");
      container.innerHTML = `<button onclick="filtrarPorSerie('all')" class="px-6 py-3 bg-gray-900 text-white rounded-3xl text-sm font-medium">Todos</button>`;
      
      series.forEach(serie => {
        const btn = document.createElement("button");
        btn.className = "px-6 py-3 bg-white border border-gray-300 hover:border-red-500 rounded-3xl text-sm font-medium";
        btn.textContent = serie;
        btn.onclick = () => filtrarPorSerie(serie);
        container.appendChild(btn);
      });
    }

    function filtrarPorSerie(serie) {
      let filtrados = productos;
      if (serie !== "all") {
        filtrados = productos.filter(p => p.serie === serie);
      }
      renderizarProductos(filtrados);
    }

    function agregarAlCarrito(id) {
      const producto = productos.find(p => p.id === id);
      const existente = carrito.find(item => item.id === id);
      
      if (existente) {
        existente.cantidad = (existente.cantidad || 1) + 1;
      } else {
        carrito.push({ ...producto, cantidad: 1 });
      }
      
      localStorage.setItem("carrito", JSON.stringify(carrito));
      actualizarContadorCarrito();
      
      // Feedback visual
      const toast = document.createElement("div");
      toast.className = "fixed bottom-6 right-6 bg-green-600 text-white px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-3";
      toast.innerHTML = `✅ <span>${producto.nombre} agregado</span>`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }

    function actualizarContadorCarrito() {
      const totalItems = carrito.reduce((sum, item) => sum + (item.cantidad || 1), 0);
      document.getElementById("cart-count").textContent = totalItems;
    }

    function mostrarCarrito() {
      const modal = document.getElementById("cart-modal");
      const container = document.getElementById("cart-items");
      container.innerHTML = "";
      
      if (carrito.length === 0) {
        container.innerHTML = `<p class="text-center py-12 text-xl">Tu carrito está vacío</p>`;
      } else {
        carrito.forEach((item, index) => {
          const div = document.createElement("div");
          div.className = "flex gap-4 border-b pb-6";
          div.innerHTML = `
            <img src="${item.img}" class="w-24 h-24 object-cover rounded-2xl">
            <div class="flex-1">
              <h4 class="font-semibold">${item.nombre}</h4>
              <p class="text-sm text-gray-500">${item.modelo}</p>
              <div class="flex justify-between mt-4">
                <span class="text-2xl font-bold">$${item.precio.toLocaleString("es-CL")}</span>
                <div class="flex items-center gap-4">
                  <button onclick="cambiarCantidad(${index}, -1)" class="w-8 h-8 flex items-center justify-center border rounded-xl">-</button>
                  <span class="font-semibold w-6 text-center">${item.cantidad || 1}</span>
                  <button onclick="cambiarCantidad(${index}, 1)" class="w-8 h-8 flex items-center justify-center border rounded-xl">+</button>
                  <button onclick="quitarDelCarrito(${index})" class="ml-4 text-red-500">Eliminar</button>
                </div>
              </div>
            </div>
          `;
          container.appendChild(div);
        });
      }
      
      // Total
      const total = carrito.reduce((sum, item) => sum + item.precio * (item.cantidad || 1), 0);
      document.getElementById("cart-total").textContent = `$${total.toLocaleString("es-CL")}`;
      
      modal.classList.remove("hidden");
    }

    function cerrarCarrito() {
      document.getElementById("cart-modal").classList.add("hidden");
    }

    function cambiarCantidad(index, delta) {
      carrito[index].cantidad = (carrito[index].cantidad || 1) + delta;
      if (carrito[index].cantidad < 1) carrito[index].cantidad = 1;
      localStorage.setItem("carrito", JSON.stringify(carrito));
      mostrarCarrito();
      actualizarContadorCarrito();
    }

    function quitarDelCarrito(index) {
      carrito.splice(index, 1);
      localStorage.setItem("carrito", JSON.stringify(carrito));
      mostrarCarrito();
      actualizarContadorCarrito();
    }

    function finalizarCompra() {
      alert("¡Gracias! En un proyecto real esto conectaría con WebPay o similar.\n\n(por ahora solo es demo)");
      carrito = [];
      localStorage.setItem("carrito", JSON.stringify(carrito));
      cerrarCarrito();
      actualizarContadorCarrito();
    }

    // ==================== INICIO ====================
    window.onload = () => {
      generarFiltros();
      renderizarProductos(productos);
      actualizarContadorCarrito();
    };
  </script>
</body>
</html>
